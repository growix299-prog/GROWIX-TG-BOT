services:
  # UNIFIED SERVICE (FastAPI + Telegram Bot) - Saves 50% Render Free Hours!
  - type: web
    name: nexautomate-unified
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: chmod +x start.sh && ./start.sh
    envVars:
      - key: SUPABASE_URL
        value: https://ogbdzspgfmctczgtasok.supabase.co
      - key: SUPABASE_SERVICE_ROLE
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ADMIN_API_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
